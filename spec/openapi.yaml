          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Term"

    get:
      tags: [Taxonomy]
      summary: Search terms
      operationId: searchTerms
      parameters:
        - in: query
          name: taxonomy_id
          required: true
          schema:
            type: string
        - in: query
          name: query
          schema:
            type: string
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedTerms"

  # ============================================
  # Banking-Grade Operational Rails
  # ============================================

  # Records Retention Rail
  /api/v1/retention/policies:
    get:
      tags: [Retention]
      summary: List retention policies
      operationId: listRetentionPolicies
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: List of retention policies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedRetentionPolicies"

    post:
      tags: [Retention]
      summary: Create retention policy
      operationId: createRetentionPolicy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRetentionPolicyRequest"
      responses:
        "201":
          description: Policy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionPolicy"

  /api/v1/retention/legal-holds:
    get:
      tags: [Retention]
      summary: List legal holds
      operationId: listLegalHolds
      responses:
        "200":
          description: List of legal holds
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedLegalHolds"

    post:
      tags: [Retention]
      summary: Create legal hold
      operationId: createLegalHold
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLegalHoldRequest"
      responses:
        "201":
          description: Legal hold created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegalHold"

  /api/v1/retention/legal-holds/{id}/release:
    post:
      tags: [Retention]
      summary: Release legal hold
      operationId: releaseLegalHold
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Legal hold released

  /api/v1/retention/purge-requests:
    post:
      tags: [Retention]
      summary: Create purge request
      operationId: createPurgeRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePurgeRequest"
      responses:
        "201":
          description: Purge request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurgeRequest"

  # Secrets & Keys Rail
  /api/v1/secrets/key-rings:
    get:
      tags: [Secrets]
      summary: List key rings
      operationId: listKeyRings
      responses:
        "200":
          description: List of key rings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedKeyRings"

    post:
      tags: [Secrets]
      summary: Create key ring
      operationId: createKeyRing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKeyRingRequest"
      responses:
        "201":
          description: Key ring created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KeyRing"

  /api/v1/secrets/keys:
    get:
      tags: [Secrets]
      summary: List keys
      operationId: listKeys
      responses:
        "200":
          description: List of keys
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedKeys"

    post:
      tags: [Secrets]
      summary: Create key
      operationId: createKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateKeyRequest"
      responses:
        "201":
          description: Key created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CryptoKey"

  /api/v1/secrets/keys/{id}/rotate:
    post:
      tags: [Secrets]
      summary: Rotate key
      operationId: rotateKey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Key rotated
          content:
            application/json:
