          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LimitCheckResult"

  /api/v1/limits/approvals:
    get:
      tags: [Limits]
      summary: List pending approvals
      operationId: listApprovals
      responses:
        "200":
          description: List of pending approvals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedApprovals"

    post:
      tags: [Limits]
      summary: Request 4-eyes approval
      operationId: createApproval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApprovalRequest"
      responses:
        "201":
          description: Approval request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalRequest"

  /api/v1/limits/approvals/{id}/approve:
    post:
      tags: [Limits]
      summary: Approve request
      operationId: approveRequest
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalDecision"
      responses:
        "200":
          description: Request approved

  /api/v1/limits/breaches:
    get:
      tags: [Limits]
      summary: List limit breaches
      operationId: listBreaches
      responses:
        "200":
          description: List of breaches
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedBreaches"

  # Data Quality Rail
  /api/v1/data-quality/validate:
    post:
      tags: [DataQuality]
      summary: Validate entity data
      operationId: validateData
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidationRequest"
      responses:
        "200":
          description: Validation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResult"

  /api/v1/data-quality/scores:
    get:
      tags: [DataQuality]
      summary: List quality scores
      operationId: listQualityScores
      parameters:
        - name: entityType
          in: query
          schema:
            type: string
        - name: minScore
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of quality scores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedQualityScores"

  /api/v1/data-quality/anomalies:
    get:
      tags: [DataQuality]
      summary: List anomalies
      operationId: listAnomalies
      responses:
        "200":
          description: List of anomalies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedAnomalies"

  /api/v1/data-quality/detect-anomalies:
    post:
      tags: [DataQuality]
      summary: Detect anomalies
      operationId: detectAnomalies
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnomalyDetectionRequest"
      responses:
        "200":
          description: Detected anomalies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnomalyDetectionResult"

  # Integration Hub Rail
  /api/v1/integrations/connectors:
    get:
      tags: [Integrations]
      summary: List connectors
      operationId: listConnectors
      responses:
        "200":
          description: List of connectors
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedConnectors"

    post:
      tags: [Integrations]
      summary: Create connector
      operationId: createConnector
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConnectorRequest"
      responses:
        "201":
          description: Connector created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Connector"

  /api/v1/integrations/connectors/{id}/test:
    post:
      tags: [Integrations]
      summary: Test connection
      operationId: testConnection
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionTestResult"

  /api/v1/integrations/sync-jobs:
    get:
      tags: [Integrations]
      summary: List sync jobs
      operationId: listSyncJobs
      responses:
        "200":
          description: List of sync jobs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSyncJobs"

    post:
      tags: [Integrations]
      summary: Start sync job
      operationId: startSyncJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartSyncJobRequest"
      responses:
        "201":
          description: Sync job started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncJob"

  /api/v1/integrations/mappings:
    get:
      tags: [Integrations]
      summary: List data mappings
      operationId: listMappings
      responses:
        "200":
          description: List of mappings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedMappings"

    post:
      tags: [Integrations]
      summary: Create mapping
      operationId: createMapping
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMappingRequest"
      responses:
        "201":
          description: Mapping created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataMapping"

  # SLA & Incident Rail
  /api/v1/sla-incident/sla/definitions:
    get:
      tags: [SLAIncident]
      summary: List SLA definitions
      operationId: listSLADefinitions
      responses:
        "200":
          description: List of SLA definitions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSLADefinitions"

    post:
      tags: [SLAIncident]
      summary: Create SLA definition
      operationId: createSLADefinition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSLADefinitionRequest"
      responses:
        "201":
          description: SLA definition created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SLADefinition"

  /api/v1/sla-incident/sla/compliance:
    get:
      tags: [SLAIncident]
      summary: Check SLA compliance
      operationId: checkSLACompliance
      responses:
        "200":
          description: SLA compliance status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SLAComplianceStatus"

  /api/v1/sla-incident/incidents:
    get:
      tags: [SLAIncident]
      summary: List incidents
      operationId: listIncidents
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [DECLARED, INVESTIGATING, MITIGATING, RESOLVED, CLOSED]
        - name: severity
          in: query
          schema:
            type: string
            enum: [P1, P2, P3, P4]
      responses:
        "200":
          description: List of incidents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedIncidents"

    post:
      tags: [SLAIncident]
      summary: Declare incident
      operationId: declareIncident
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeclareIncidentRequest"
      responses:
        "201":
          description: Incident declared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"

  /api/v1/sla-incident/incidents/{id}:
    get:
      tags: [SLAIncident]
      summary: Get incident details
      operationId: getIncident
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Incident details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Incident"

  /api/v1/sla-incident/incidents/{id}/timeline:
    post:
      tags: [SLAIncident]
      summary: Add timeline entry
      operationId: addTimelineEntry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TimelineEntry"
      responses:
        "201":
          description: Timeline entry added

  /api/v1/sla-incident/incidents/{id}/resolve:
    post:
      tags: [SLAIncident]
      summary: Resolve incident
      operationId: resolveIncident
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveIncidentRequest"
      responses:
        "200":
          description: Incident resolved

  /api/v1/sla-incident/incidents/{id}/rca:
    post:
      tags: [SLAIncident]
      summary: Create RCA
      operationId: createRCA
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRCARequest"
      responses:
        "201":
          description: RCA created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RootCauseAnalysis"

  /api/v1/sla-incident/status-page:
    get:
      tags: [SLAIncident]
      summary: Get status page
      operationId: getStatusPage
      responses:
        "200":
          description: Status page data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusPage"

  /api/v1/sla-incident/maintenance-windows:
    get:
      tags: [SLAIncident]
      summary: List maintenance windows
      operationId: listMaintenanceWindows
      responses:
        "200":
          description: List of maintenance windows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedMaintenanceWindows"

    post:
      tags: [SLAIncident]
      summary: Schedule maintenance window
      operationId: scheduleMaintenanceWindow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleMaintenanceRequest"
      responses:
        "201":
          description: Maintenance window scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaintenanceWindow"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token (RS256)

    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: API key for service-to-service authentication

  parameters:
    Page:
      name: page
      in: query
      description: Page number (1-indexed)
      schema:
        type: integer
        minimum: 1
        default: 1

    Limit:
      name: limit
      in: query
      description: Items per page
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    ContractId:
      name: id
      in: path
      required: true
      description: Contract ID
      schema:
        type: string
        pattern: "^CNT-[A-Z0-9]+$"

    CardId:
      name: id
      in: path
      required: true
      description: Card ID
      schema:
        type: string
        pattern: "^CRD-[A-Z0-9]+$"

  schemas:
    # Common schemas
    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        total_pages:
          type: integer
          minimum: 0

    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
            trace_id:
              type: string
              format: uuid

    # Contract schemas
    CreateMurabahaRequest:
      type: object
      required:
        [
          customer_id,
          asset_description,
          cost_price,
          profit_amount,
          installment_count,
        ]
      properties:
        customer_id:
          type: string
        asset_description:
          type: string
        asset_category:
          type: string
          enum: [REAL_ESTATE, VEHICLE, EQUIPMENT, COMMODITY]
        cost_price:
          type: number
          minimum: 0
        profit_amount:
          type: number
          minimum: 0
        installment_count:
          type: integer
          minimum: 1
          maximum: 360
        currency:
          type: string
          minLength: 3
          maxLength: 3
          pattern: "^[A-Z]{3}$"

    MurabahaContract:
      type: object
      properties:
        id:
          type: string
        tenant_id:
          type: string
        workspace_id:
          type: string
        customer_id:
          type: string
        asset_description:
          type: string
        cost_price:
          type: number
        profit_amount:
          type: number
        total_amount:
          type: number
        installment_count:
          type: integer
        status:
          type: string
          enum:
            [
              DRAFT,
              PENDING_ASSET_PURCHASE,
              ASSET_PURCHASED,
              ACTIVE,
              COMPLETED,
              CANCELLED,
            ]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    PaginatedMurabahaContracts:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MurabahaContract"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    # Card schemas
    IssueCardRequest:
      type: object
      required: [customer_id, card_type, account_id]
      properties:
        customer_id:
          type: string
        card_type:
          type: string
          enum: [DEBIT, CHARGE]
        account_id:
          type: string
        embossed_name:
          type: string
        limits:
          type: object
          properties:
            single_transaction:
              type: number
            daily_limit:
              type: number
            monthly_limit:
              type: number

    Card:
      type: object
      properties:
        id:
          type: string
        customer_id:
          type: string
        card_type:
          type: string
        masked_pan:
          type: string
          pattern: '^\\d{4}\\s\\*{4}\\s\\*{4}\\s\\d{4}$'
        expiry_date:
          type: string
          pattern: '^\\d{2}/\\d{2}$'
        status:
          type: string
          enum: [ACTIVE, BLOCKED, EXPIRED, CANCELLED]
        created_at:
          type: string
          format: date-time

    PaginatedCards:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Card"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    PaginatedAuthorizations:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              auth_id:
                type: string
              amount:
                type: number
              merchant:
                type: string
              mcc:
                type: string
              status:
                type: string
                enum: [PENDING, APPROVED, DECLINED, SETTLED]
              created_at:
                type: string
                format: date-time
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    # Shariah schemas
    ShariahEvaluationRequest:
      type: object
      required: [entity_type, entity_data]
      properties:
        entity_type:
          type: string
          enum: [CONTRACT, TRANSACTION, INVESTMENT, FEE]
        entity_data:
          type: object

    ShariahEvaluation:
      type: object
      properties:
        evaluation_id:
          type: string
        entity_type:
          type: string
        compliant:
          type: boolean
        rules_evaluated:
          type: array
          items:
            type: object
            properties:
              rule_id:
                type: string
              rule_name:
                type: string
              result:
                type: string
                enum: [PASS, FAIL]
        breaches:
          type: array
          items:
            type: object
            properties:
              rule_id:
                type: string
              severity:
                type: string
                enum: [LOW, MEDIUM, HIGH, CRITICAL]
              message:
                type: string
        created_at:
          type: string
          format: date-time

    PaginatedShariahRules:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              rule_id:
                type: string
              name:
                type: string
              category:
                type: string
              description:
                type: string
              status:
                type: string
                enum: [ACTIVE, DEPRECATED]
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    # AML schemas
    AMLScreeningRequest:
      type: object
      required: [entity_type, entity_id]
      properties:
        entity_type:
          type: string
          enum: [CUSTOMER, TRANSACTION, MERCHANT]
        entity_id:
          type: string
        screening_type:
          type: string
          enum: [SANCTIONS, PEP, ADVERSE_MEDIA]

    AMLScreening:
      type: object
      properties:
        screening_id:
          type: string
        entity_type:
          type: string
        entity_id:
          type: string
        status:
          type: string
          enum: [PENDING, PASSED, FAILED, REVIEW_REQUIRED]
        matches:
          type: array
          items:
            type: object
            properties:
              match_type:
                type: string
              confidence_score:
                type: number
                minimum: 0
                maximum: 1
              details:
                type: object
        created_at:
          type: string
          format: date-time

    PaginatedAMLAlerts:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              alert_id:
                type: string
              severity:
                type: string
                enum: [LOW, MEDIUM, HIGH, CRITICAL]
              alert_type:
                type: string
              entity_id:
                type: string
              status:
                type: string
                enum: [OPEN, INVESTIGATING, RESOLVED, FALSE_POSITIVE]
              created_at:
                type: string
                format: date-time
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    # Metadata schemas
    CreateMetadataRequest:
      type: object
      required: [entity, classification, provenance]
      properties:
        entity:
          type: object
          required: [tenant_id, workspace_id, rail, entity_type, entity_id]
          properties:
            tenant_id:
              type: string
            workspace_id:
              type: string
            rail:
              type: string
            entity_type:
              type: string
            entity_id:
              type: string
        classification:
          type: object
          required: [confidentiality, pii, secrecy_tier]
          properties:
            confidentiality:
              type: string
              enum: [PUBLIC, INTERNAL, CONFIDENTIAL, RESTRICTED]
            pii:
              type: string
              enum: [NONE, LOW, MODERATE, HIGH]
            secrecy_tier:
              type: string
              enum: [T0, T1, T2, T3]
        provenance:
          type: object
          required: [producer, trace_id]
          properties:
            producer:
              type: string
            trace_id:
              type: string
            source_system:
              type: string

    EntityMetadata:
      type: object
      properties:
        entity:
          type: object
        version:
          type: integer
        tags:
          type: object
        labels:
          type: array
          items:
            type: string
        classification:
          type: object
        provenance:
          type: object
        created_at:
          type: string
          format: date-time

    PaginatedEntityMetadata:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/EntityMetadata"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    LineageGraph:
      type: object
      properties:
        root_entity:
          type: object
        edges:
          type: array
          items:
            type: object
            properties:
              source:
                type: object
              derived:
                type: object
              edge_type:
                type: string
                enum: [DERIVED_FROM, SETTLED_BY, EVIDENCED_BY, POSTED_TO_LEDGER]
              created_at:
                type: string
                format: date-time

    # Taxonomy schemas
    CreateTaxonomyRequest:
      type: object
      required: [taxonomy_id, name]
      properties:
        taxonomy_id:
          type: string
        name:
          type: string
        description:
          type: string

    Taxonomy:
      type: object
      properties:
        taxonomy_id:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [ACTIVE, DEPRECATED]
        created_at:
          type: string
          format: date-time

    CreateTermRequest:
      type: object
      required: [taxonomy_id, term_id, label]
      properties:
        taxonomy_id:
          type: string
        term_id:
          type: string
        label:
          type: string
        definition:
          type: string
        parent_id:
          type: string

    Term:
      type: object
      properties:
        term_id:
          type: string
        taxonomy_id:
          type: string
        label:
          type: string
        definition:
          type: string
        parent_id:
          type: string
        status:
          type: string
          enum: [ACTIVE, DEPRECATED]
        created_at:
          type: string
          format: date-time

    PaginatedTerms:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Term"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    # ============================================
    # Banking-Grade Operational Rails Schemas
    # ============================================

    # Retention Rail Schemas
    CreateRetentionPolicyRequest:
      type: object
      required: [name, retentionDays, artifactTypes]
      properties:
        name:
          type: string
        retentionDays:
          type: integer
          minimum: 1
        artifactTypes:
          type: array
          items:
            type: string
            enum:
              [
                CONTRACT,
                DOCUMENT,
                AUDIT_LOG,
                TRANSACTION,
                COMMUNICATION,
                REPORT,
              ]
        storageType:
          type: string
          enum: [STANDARD, WORM]
        description:
          type: string

    RetentionPolicy:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        retentionDays:
          type: integer
        artifactTypes:
          type: array
          items:
            type: string
        storageType:
          type: string
        status:
          type: string
          enum: [ACTIVE, INACTIVE]
        createdAt:
          type: string
          format: date-time

    PaginatedRetentionPolicies:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/RetentionPolicy"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    CreateLegalHoldRequest:
      type: object
      required: [matterName, custodian, artifactTypes]
      properties:
        matterName:
          type: string
        custodian:
          type: string
        artifactTypes:
          type: array
          items:
            type: string
        description:
          type: string
        retentionOverride:
          type: string
          format: date-time

    LegalHold:
      type: object
      properties:
        id:
          type: string
        matterName:
          type: string
        custodian:
          type: string
        artifactTypes:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [ACTIVE, RELEASED]
        createdAt:
          type: string
          format: date-time

    PaginatedLegalHolds:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/LegalHold"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    CreatePurgeRequest:
      type: object
      required: [artifactIds, reason]
      properties:
        artifactIds:
          type: array
          items:
            type: string
        reason:
          type: string

    PurgeRequest:
      type: object
      properties:
        id:
          type: string
        artifactIds:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED, EXECUTED]
        reason:
          type: string
        createdAt:
          type: string
          format: date-time

    # Secrets Rail Schemas
    CreateKeyRingRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string

    KeyRing:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        keyCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    PaginatedKeyRings:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/KeyRing"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    CreateKeyRequest:
      type: object
      required: [keyRingId, algorithm, purpose]
      properties:
        keyRingId:
          type: string
        algorithm:
          type: string
          enum: [RSA_2048, RSA_4096, EC_P256, EC_P384, AES_256, HMAC_SHA256]
        purpose:
          type: string
          enum: [SIGNING, ENCRYPTION, AUTHENTICATION]
        expiresIn:
          type: string

    CryptoKey:
      type: object
      properties:
        id:
          type: string
        keyRingId:
          type: string
        algorithm:
          type: string
        purpose:
          type: string
        version:
          type: integer
        status:
          type: string
          enum: [ACTIVE, DISABLED, SCHEDULED_FOR_DESTRUCTION, DESTROYED]
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    PaginatedKeys:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CryptoKey"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    SignRequest:
      type: object
      required: [keyId, data]
      properties:
        keyId:
          type: string
        data:
          type: string
          format: byte
        algorithm:
          type: string
          default: SHA256

    SignResponse:
      type: object
      properties:
        signature:
          type: string
          format: byte
        keyVersion:
          type: integer

    VerifyRequest:
      type: object
      required: [keyId, data, signature]
      properties:
        keyId:
          type: string
        data:
          type: string
          format: byte
        signature:
          type: string
          format: byte

    VerifyResponse:
      type: object
      properties:
        valid:
          type: boolean
        keyVersion:
          type: integer

    # Limits Rail Schemas
    CreateLimitRequest:
      type: object
      required: [name, limitType, amount, currency]
      properties:
        name:
          type: string
        limitType:
          type: string
          enum:
            [
              TRANSACTION,
              DAILY,
              WEEKLY,
              MONTHLY,
              ANNUAL,
              COUNTERPARTY,
              CONCENTRATION,
              VELOCITY,
            ]
        amount:
          type: number
        currency:
          type: string
        scope:
          type: string
        counterpartyId:
          type: string
        requiresApproval:
          type: boolean
        fourEyesRequired:
          type: boolean

    Limit:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        limitType:
          type: string
        amount:
          type: number
        currency:
          type: string
        utilizationPercent:
          type: number
        status:
          type: string
          enum: [ACTIVE, INACTIVE, BREACHED]
        createdAt:
          type: string
          format: date-time

    PaginatedLimits:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Limit"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    LimitCheckRequest:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: number
        currency:
          type: string
        scope:
          type: string
        counterpartyId:
          type: string

    LimitCheckResult:
      type: object
      properties:
        result:
          type: string
          enum: [ALLOWED, DENIED, REQUIRES_APPROVAL]
        limitId:
          type: string
        utilizationBefore:
          type: number
        utilizationAfter:
          type: number
        approvalRequired:
          type: object
          properties:
            limitId:
              type: string
            reason:
              type: string

    CreateApprovalRequest:
      type: object
      required: [limitId, amount, currency, reason]
      properties:
        limitId:
          type: string
        amount:
          type: number
        currency:
          type: string
        reason:
          type: string
        transactionData:
          type: object

    ApprovalRequest:
      type: object
      properties:
        id:
          type: string
        limitId:
          type: string
        amount:
          type: number
        currency:
          type: string
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED, EXPIRED]
        firstApproverId:
          type: string
        secondApproverId:
          type: string
        createdAt:
          type: string
          format: date-time

    PaginatedApprovals:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ApprovalRequest"
        meta:
          $ref: "#/components/schemas/PaginationMeta"

    ApprovalDecision:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [APPROVED, REJECTED]
        comment:
          type: string

    PaginatedBreaches:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              limitId:
                type: string
              breachAmount:
                type: number
              severity:
                type: string
                enum: [WARNING, BREACH, CRITICAL]
              status:
                type: string
                enum: [OPEN, ACKNOWLEDGED, RESOLVED]
