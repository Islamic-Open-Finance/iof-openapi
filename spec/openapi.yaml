              schema:
                $ref: "#/components/schemas/PaginatedLimits"

    post:
      tags: [Limits]
      summary: Create limit
      operationId: createLimit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLimitRequest"
      responses:
        "201":
          description: Limit created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Limit"

  /api/v1/limits/check:
    post:
      tags: [Limits]
      summary: Check transaction against limits
      operationId: checkLimit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LimitCheckRequest"
      responses:
        "200":
