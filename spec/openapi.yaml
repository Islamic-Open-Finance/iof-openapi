      tags: [Secrets]
      summary: Sign data
      operationId: signData
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignRequest"
      responses:
        "200":
          description: Signature created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SignResponse"

  /api/v1/secrets/verify:
    post:
      tags: [Secrets]
      summary: Verify signature
      operationId: verifySignature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyRequest"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyResponse"

  # Limits & Controls Rail
  /api/v1/limits:
    get:
      tags: [Limits]
      summary: List limits
      operationId: listLimits
      responses:
        "200":
          description: List of limits
          content:
